# Minimal nsjail configuration - no cgroups
# Use this to test if cgroups are the issue

name: "rce-sandbox"
description: "Minimal sandbox for testing"

mode: ONCE
hostname: "sandbox"
cwd: "/code"

# Time limit only
time_limit: 60
max_cpus: 1

# Basic rlimits (these work without special permissions)
# Type must be VALUE to actually use the specified value!
# HARD/SOFT just copies the current system limit, ignoring your value
# Valid types: VALUE, SOFT, HARD, INF
rlimit_as_type: VALUE
rlimit_as: 1024
rlimit_cpu_type: VALUE
rlimit_cpu: 10
rlimit_nofile_type: VALUE
rlimit_nofile: 64
rlimit_fsize_type: VALUE
rlimit_fsize: 10
rlimit_nproc_type: VALUE
rlimit_nproc: 50
rlimit_core_type: VALUE
rlimit_core: 0

# Cgroup v2 limits (requires root for full functionality)
# For production: run nsjail as root with all cgroup controls
# For development/testing without root: comment out use_cgroupv2 and rely on rlimits
# Cgroup limits - requires root, uncomment for production
use_cgroupv2: true
cgroup_mem_max: 52428800        # 50 MB default (overridden per-request by --cgroup_mem_max CLI flag)
cgroup_pids_max: 50            # Java JVM spawns many internal threads
cgroup_cpu_ms_per_sec: 500      # 500ms CPU per second (50% throttle)

# Namespace isolation
clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# User mapping
uidmap {
    inside_id: "65534"
    outside_id: ""
    count: 1
}

gidmap {
    inside_id: "65534"
    outside_id: ""
    count: 1
}

# Filesystem mounts
mount {
    dst: "/"
    fstype: "tmpfs"
    rw: false
}

mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    nosuid: true
    rw: false
}

mount {
    src: "/usr/lib"
    dst: "/lib"
    is_symlink: true
}

mount {
    src: "/usr/lib64"
    dst: "/lib64"
    is_symlink: true
}

mount {
    src: "/usr/lib32"
    dst: "/lib32"
    is_symlink: true
}

mount {
    src: "/usr/libx32"
    dst: "/libx32"
    is_symlink: true
}

mount {
    src: "/usr/bin"
    dst: "/bin"
    is_symlink: true
}

mount {
    src: "/usr/sbin"
    dst: "/sbin"
    is_symlink: true
}

mount {
    dst: "/proc"
    fstype: "proc"
    nosuid: true
    rw: false
}

# Mask sensitive /proc directories that leak host information
# NOTE: tmpfs can only mask directories, not individual files
# Files like /proc/version, /proc/cpuinfo are low-severity info leaks
# that cannot be masked without removing /proc entirely

# /proc/bus - hardware bus information
mount {
    dst: "/proc/bus"
    fstype: "tmpfs"
    rw: false
}

# /proc/irq - interrupt information
mount {
    dst: "/proc/irq"
    fstype: "tmpfs"
    rw: false
}

# /proc/sys - kernel tunables (prevents reads and writes)
mount {
    dst: "/proc/sys"
    fstype: "tmpfs"
    rw: false
}

# /proc/scsi - SCSI device information
mount {
    dst: "/proc/scsi"
    fstype: "tmpfs"
    rw: false
}

mount {
    dst: "/dev"
    fstype: "tmpfs"
    nosuid: true
    rw: false
}

mount {
    dst: "/tmp"
    fstype: "tmpfs"
    nosuid: true
    rw: true
}

# Environment
envar: "PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
envar: "HOME=/tmp"
envar: "TMPDIR=/tmp"
envar: "LANG=C.UTF-8"

# Security
silent: false

skip_setsid: false

disable_no_new_privs: false


# ============================================
# SECCOMP-BPF SYSCALL FILTERING
# ============================================

# IMPORTANT: Why Blacklist Instead of Whitelist?
#
# A pure whitelist approach (DEFAULT KILL) is theoretically more secure,
# but has practical challenges for Python:
#
# 1. Syscall name variations across kernel versions and architectures
# 2. Python's dynamic nature requires many syscalls
# 3. Maintenance burden - easy to miss required syscalls
# 4. Risk of breaking legitimate code
#
# Our blacklist approach still provides strong security by:
# - Blocking the most dangerous syscalls explicitly
# - Relying on namespace isolation (network, PID, mount, IPC, user)
# - Using rlimits for resource control
# - Read-only filesystem prevents most attacks
# - Dropped capabilities prevent privilege escalation
#
# This provides defense-in-depth without the brittleness of pure whitelisting.

seccomp_string:
  "POLICY sandbox { "
  "ERRNO(1) { "
    "ptrace, "
    "process_vm_readv, process_vm_writev, "
    "init_module, finit_module, delete_module, "
    "mount, mknod, pivot_root, "
    "io_uring_setup, io_uring_enter, io_uring_register, "
    "swapon, swapoff, "
    "reboot, kexec_load, kexec_file_load, "
    "settimeofday, clock_settime, "
    "sethostname, setdomainname, "
    "add_key, request_key, keyctl, "
    "bpf, perf_event_open, "
    "userfaultfd, "
    "setns, unshare, "
    "execveat, "
    "socket "
  "} "
  "} "
  "USE sandbox DEFAULT ALLOW"